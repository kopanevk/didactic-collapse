project:
  name: didactic_collapse
  seed: 42
  run_tag: baseline

paths:
  data_root: data
  output_root: outputs
  prompt_dir: configs/prompts

models:
  local_models:
    - name: qwen2.5:0.5b
      role: subject
    - name: smollm2:360m
      role: subject
    - name: smollm2:1.7b
      role: subject

judge:
  provider: cerebras
  model_name: llama-3.1-8b
  base_url: https://api.cerebras.ai/v1
  api_key_env: CEREBRAS_API_KEY
  timeout_sec: 120
  max_retries: 3
  request_delay_sec: 0.8
  max_completion_tokens: 180
  comment_max_chars: 120
  cache_enabled: true
  cache_path: outputs/cache/judge_cache.sqlite
  cerebras_min_request_interval_sec: 0.8
  cerebras_max_retry_after_sec: 60
  cerebras_max_429_retries: 6
  cerebras_jitter_sec: 0.75

sampling:
  temperature: 0.2
  top_p: 0.9
  max_tokens: 512

experiment:
  generations: 3
  branches:
    - name: pure_recycling
      anchor_ratio: 0.0
    - name: anchor_5
      anchor_ratio: 0.05
    - name: anchor_10
      anchor_ratio: 0.10

dataset:
  source: gsm8k
  base_train_size: 3000
  anchor_pool_size: 1000
  heldout_test_size: 1000

runtime:
  force_recompute: false
  save_parquet: true
  save_csv: true
  generation_prompt_version: v1
