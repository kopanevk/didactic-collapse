project:
  name: didactic_collapse
  seed: 42
  run_tag: first_real_experiment

paths:
  data_root: data
  output_root: outputs
  prompt_dir: configs/prompts

models:
  local_models:
    - name: qwen2.5:0.5b
      role: subject

judge:
  provider: gemini_openai_compatible
  model_name: gemini-2.5-flash
  base_url: https://generativelanguage.googleapis.com/v1beta/openai
  api_key_env: GEMINI_API_KEY
  timeout_sec: 60
  max_retries: 3

sampling:
  temperature: 0.0
  top_p: 1.0
  max_tokens: 256

experiment:
  generations: 2
  branches:
    - name: pure_recycling
      anchor_ratio: 0.0
    - name: anchor_10
      anchor_ratio: 0.10

dataset:
  source: gsm8k
  base_train_size: 100
  anchor_pool_size: 200
  heldout_test_size: 100

runtime:
  force_recompute: false
  save_parquet: true
  save_csv: true
