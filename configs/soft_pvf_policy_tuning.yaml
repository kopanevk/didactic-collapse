project:
  name: didactic_collapse
  seed: 131
  run_tag: soft_pvf_policy_tuning

paths:
  data_root: data
  output_root: outputs
  prompt_dir: configs/prompts

models:
  local_models:
    - name: qwen2.5:0.5b
      role: subject

judge:
  provider: cerebras
  model_name: llama-3.1-8b
  base_url: https://api.cerebras.ai/v1
  api_key_env: CEREBRAS_API_KEY
  timeout_sec: 180
  max_retries: 4
  request_delay_sec: 1.0

sampling:
  temperature: 0.2
  top_p: 0.95
  max_tokens: 896

experiment:
  mode: inference_recycling_only
  generations: 3
  branches:
    - name: pure_recycling
      branch_type: pure_recycling
      anchor_ratio: 0.0
      mixing_mode: append

    - name: pvf_medium
      branch_type: pvf_medium
      anchor_ratio: 0.0
      mixing_mode: append
      pvf_threshold_score: 5
      pvf_min_keep_ratio: 0.15

    - name: soft_pvf_medium
      branch_type: soft_pvf_medium
      soft_pvf_policy_name: soft_pvf_medium
      anchor_ratio: 0.0
      mixing_mode: append
      soft_pvf_high_quality_threshold: 6
      soft_pvf_medium_quality_threshold: 4
      soft_pvf_weight_high: 1.0
      soft_pvf_weight_medium: 0.5
      soft_pvf_weight_low_correct: 0.25
      soft_pvf_weight_incorrect: 0.1
      soft_pvf_min_keep_ratio: 0.15

    - name: soft_pvf_lenient
      branch_type: soft_pvf_medium
      soft_pvf_policy_name: soft_pvf_lenient
      anchor_ratio: 0.0
      mixing_mode: append
      soft_pvf_min_keep_ratio: 0.15

    - name: soft_pvf_noisy_keep
      branch_type: soft_pvf_medium
      soft_pvf_policy_name: soft_pvf_noisy_keep
      anchor_ratio: 0.0
      mixing_mode: append
      soft_pvf_min_keep_ratio: 0.15

    - name: soft_pvf_silent_only
      branch_type: soft_pvf_medium
      soft_pvf_policy_name: soft_pvf_silent_only
      anchor_ratio: 0.0
      mixing_mode: append
      soft_pvf_min_keep_ratio: 0.15

dataset:
  source: gsm8k
  base_train_size: 120
  anchor_pool_size: 400
  heldout_test_size: 200

runtime:
  force_recompute: false
  save_parquet: true
  save_csv: true
  generation_prompt_version: v2_strict_final
  partial_save_every_n: 10
  max_row_failures: 10
  continue_on_row_error: true

training:
  backend: command
  command_template: >
    python scripts/train_feasibility_adapter.py
    --input "{train_path}"
    --output-dir "{output_dir}"
    --base-model "{base_model}"
    --target-model "{target_model}"
    --seed {seed}
    --base-url http://localhost:11434
    --timeout-sec 900
    --max-examples 32
    --max-chars 5000
  command_timeout_sec: 3600
  output_model_name_template: "{base_model}__{branch}__ft_g{generation_to}_s{seed}"
  result_filename: training_result.json
  run_gen1_recycling_stages: false
  allow_stub_for_smoke: false
  max_train_rows: 200
